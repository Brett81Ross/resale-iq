<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 80px; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #333; color: #fff; font-size: 16px; cursor: pointer; }
        .analyze-btn { background: #0070f3; font-weight: bold; }
        #preview { width: 100%; border-radius: 10px; margin: 10px 0; display: none; }
        #result { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; display: none; white-space: pre-wrap; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo1.png" class="logo" alt="Logo">
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📷 Choose Item Photo</button>
        <img id="preview">
        <button id="analyzeBtn" class="btn analyze-btn">Analyze Item</button>
        <div id="status"></div>
        <div id="result"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const status = document.getElementById('status');
        const result = document.getElementById('result');

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        };

        analyzeBtn.onclick = async () => {
            if (!preview.src || preview.src.startsWith('blob:') === false) return alert("Pick a photo first!");
            
            status.innerText = "Resizing and Analyzing...";
            analyzeBtn.disabled = true;

            // Resize the image to fit under Vercel's 4.5MB limit
            const img = new Image();
            img.src = preview.src;
            await img.decode();
            
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800; // Force width to 800px
            const scale = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scale;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            // Convert to base64 at 0.6 quality (reduces size further)
            const base64Image = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64: base64Image })
                });

                const data = await response.json();
                if (response.ok && data.candidates) {
                    result.innerText = data.candidates[0].content.parts[0].text;
                    result.style.display = 'block';
                    status.innerText = "Analysis Complete!";
                } else {
                    status.innerText = "Error: " + (data.error || "Failed to analyze.");
                }
            } catch (err) {
                status.innerText = "Connection Error: " + err.message;
            } finally {
                analyzeBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
