<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 250px; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #333; color: #fff; font-size: 16px; cursor: pointer; }
        #gallery { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        #gallery img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
        #result { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; white-space: pre-wrap; font-size: 16px; line-height: 1.5; }
        .history-item { background: #222; padding: 12px; margin-top: 10px; border-radius: 8px; border-left: 4px solid #0070f3; text-align: left; }
        .status-btn { margin-top: 5px; cursor: pointer; background: #0070f3; color: white; border: none; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo1.png" class="logo" alt="Logo">
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📁 Select Photos</button>
        <button class="btn" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
        
        <div id="gallery"></div>
        <div id="status"></div>
        <div id="result"></div>
        <div id="historyContainer"></div>
    </div>

    <script>
        let allImages = [];
        const hist = document.getElementById('historyContainer');

        async function handleFiles(files) {
            allImages = []; document.getElementById('gallery').innerHTML = "";
            for (const file of Array.from(files)) {
                const b64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = 800; canvas.height = img.height * (800 / img.width);
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            r(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
                allImages.push(b64);
            }
            runAnalysis();
        }

        async function runAnalysis() {
            const res = await fetch('/api/analyze', { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ imagesBase64: allImages }) 
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            document.getElementById('result').innerText = text;
            
            // Save as object with status
            let h = JSON.parse(localStorage.getItem('resaleHistory') || '[]');
            h.unshift({ text: text, status: 'Active' });
            localStorage.setItem('resaleHistory', JSON.stringify(h.slice(0, 5)));
            renderHistory();
        }

        function updateStatus(index, newStatus) {
            let h = JSON.parse(localStorage.getItem('resaleHistory'));
            h[index].status = newStatus;
            localStorage.setItem('resaleHistory', JSON.stringify(h));
            renderHistory();
        }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('resaleHistory') || '[]');
            hist.innerHTML = "<h3>History</h3>";
            h.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<div>${item.text.substring(0, 50)}...</div>
                                 <small>Status: ${item.status}</small><br>
                                 <button class="status-btn" onclick="updateStatus(${index}, 'Sold')">Mark Sold</button>`;
                hist.appendChild(div);
            });
        }

        document.getElementById('fileInput').onchange = (e) => handleFiles(e.target.files);
        document.getElementById('cameraInput').onchange = (e) => handleFiles(e.target.files);
        window.onload = renderHistory;
    </script>
</body>
</html>
