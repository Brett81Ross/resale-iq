<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        :root { --primary: #0070f3; --bg: #000; --text: #fff; --secondary: #333; }
        body { font-family: sans-serif; text-align: center; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        .custom-btn { display: block; width: 80%; margin: 10px auto; padding: 15px; background: var(--secondary); color: white; border-radius: 10px; border: none; cursor: pointer; font-size: 16px; }
        .btn-primary { background: var(--primary); }
        #imagePreview { max-width: 100%; margin-top: 20px; border-radius: 10px; display: none; }
        #result { margin-top: 20px; padding: 15px; background: #222; border-radius: 10px; display: none; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <img src="1000034184.png" alt="Resale IQ Logo" class="logo">
        <h1>Resale IQ</h1>
        
        <button class="custom-btn btn-primary" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

        <button class="custom-btn" onclick="document.getElementById('fileInput').click()">📂 Choose from Gallery</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">

        <img id="imagePreview" alt="Preview">
        
        <button id="analyzeBtn" class="custom-btn btn-primary" style="display:none;" onclick="analyzeImage()">🔍 Analyze Item</button>
        <div id="result">Waiting for AI...</div>
    </div>

    <script>
        let base64Image = "";

        function handleImage(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                base64Image = e.target.result.split(',')[1];
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'inline-block';
                document.getElementById('analyzeBtn').style.display = 'block';
                document.getElementById('result').style.display = 'none';
            }
            reader.readAsDataURL(file);
        }

        async function analyzeImage() {
            const apiKey = "AIzaSyCeMbnNVBkz936lHVWMkLVRgdKLDIoiDj4"; 
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerText = "Analyzing...";

            try {
                // Switched to v1 and gemini-1.5-flash
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Identify this item and provide an estimated resale price range." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    resultDiv.innerText = "API Error: " + data.error.message;
                } else {
                    resultDiv.innerText = data.candidates[0].content.parts[0].text;
                }
            } catch (error) {
                resultDiv.innerText = "Network Error: Could not reach AI service.";
            }
        }

        document.getElementById('cameraInput').addEventListener('change', handleImage);
        document.getElementById('fileInput').addEventListener('change', handleImage);
    </script>
</body>
</html>
