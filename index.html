<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResaleIQ</title>
    <style>
        /* Base Application Layout */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* App Wrapper */
        .app-wrapper {
            flex: 1;
            padding: 16px;
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* Header Image Positioning */
        .brand-header {
            text-align: left;
            margin-bottom: 20px;
        }

        .main-logo {
            max-width: 260px;
            height: auto;
            display: block;
        }

        /* Cards & Panels */
        .profit-card {
            background-color: #161616;
            border-radius: 16px;
            padding: 24px 16px;
            text-align: center;
            position: relative;
            margin-bottom: 16px;
        }

        .card-title {
            color: #8a8a8f;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .profit-amount {
            color: #2ecc71;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0;
        }

        /* Interactive Info Icons */
        .info-trigger {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #007aff;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Form Inputs */
        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .app-input {
            width: 100%;
            background-color: #161616;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            color: #ffffff;
            box-sizing: border-box;
        }

        .app-input::placeholder {
            color: #555555;
        }

        .input-group .info-trigger {
            top: 50%;
            transform: translateY(-50%);
            right: 16px;
        }

        /* UI Action Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #ffffff;
        }

        .btn-blue { background-color: #007aff; }
        .btn-green { background-color: #34c759; }
        .btn-orange { background-color: #ff9f0a; margin-top: 8px; }

        /* Section Headings */
        .section-label {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 24px 0 16px 0;
            color: #ffffff;
        }

        /* Information Modals/Popups */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 14px;
            padding: 20px;
            max-width: 320px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .modal-text {
            color: #ffffff;
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .modal-close-btn {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        /* App Legal Footer */
        .app-footer {
            background-color: #0a0a0a;
            border-top: 1px solid #161616;
            padding: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #666666;
            margin-top: auto;
        }

        .footer-logo {
            height: 18px;
            vertical-align: middle;
            margin-right: 6px;
            opacity: 0.5;
        }

        .copyright-text {
            display: inline-block;
            vertical-align: middle;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <div class="brand-header">
            <img src="logo1.png" alt="ResaleIQ" class="main-logo">
        </div>

        <div class="profit-card">
            <div class="card-title">Net Profit</div>
            <p class="profit-amount">$0.00</p>
            <button class="info-trigger" onclick="openModal('net-profit')">ⓘ</button>
        </div>

        <div class="input-group">
            <input type="number" class="app-input" placeholder="Sourcing Cost ($)" inputmode="decimal">
            <button class="info-trigger" onclick="openModal('sourcing-cost')">ⓘ</button>
        </div>

        <button class="btn btn-blue">
            <span>📁</span> Select Photos
        </button>
        
        <button class="btn btn-green">
            <span>📷</span> Take Photo
        </button>

        <div class="section-label">Add Expense</div>

        <div class="input-group">
            <input type="text" class="app-input" placeholder="Description (e.g., Mileage)">
        </div>

        <div class="input-group">
            <input type="number" class="app-input" placeholder="Amount ($)" inputmode="decimal">
        </div>

        <button class="btn btn-orange">Add Expense</button>

        <div class="section-label">Inventory Log</div>

    </div>

    <div class="modal-overlay" id="info-modal">
        <div class="modal-box">
            <div class="modal-text" id="modal-content-field">Context text drops here.</div>
            <button class="modal-close-btn" onclick="closeModal()">Dismiss</button>
        </div>
    </div>

    <footer class="app-footer">
        <img src="logo1.png" alt="ResaleIQ Logo" class="footer-logo">
        <div class="copyright-text">
            &copy; <span id="copyright-year"></span> ResaleIQ. All Rights Reserved.
        </div>
    </footer>

    <script>
        // Synchronize copyright timestamp data automatically 
        document.getElementById('copyright-year').textContent = new Date().getFullYear();

        // Object containing text payloads for descriptive popups
        const infoExplainerData = {
            'net-profit': 'Your Net Profit calculates your total sales values minus item sourcing fees, marketplace shipping rates, and calculated mileage/operating expenses.',
            'sourcing-cost': 'Enter the precise amount paid out-of-pocket to purchase this item before restoration, listing fees, or secondary shipping costs.'
        };

        // UI Modal Visibility Management Logic
        function openModal(contextKey) {
            const descriptionString = infoExplainerData[contextKey] || 'Information parameters unavailable.';
            document.getElementById('modal-content-field').textContent = descriptionString;
            document.getElementById('info-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('info-modal').classList.remove('active');
        }

        // Tap background shield container to close modal cleanly
        document.getElementById('info-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
