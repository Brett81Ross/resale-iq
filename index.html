<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px auto; max-width: 400px; }
        .btn { width: 100%; padding: 15px; background: #222; color: white; border: 1px solid #444; border-radius: 10px; margin-top: 10px; cursor: pointer; font-size: 16px; display: block; text-align: center; text-decoration: none; }
        .analyze-btn { background: #0070f3 !important; font-weight: bold; margin-top: 20px; display: none; }
        #preview { width: 100%; border-radius: 10px; margin-top: 15px; display: none; }
        #status { margin-top: 15px; font-size: 14px; color: #888; }
        #result { margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 10px; text-align: left; white-space: pre-wrap; color: #ddd; display: none; }
        /* Visually hide input but keep it accessible for click */
        .file-input-wrapper { display: none; }
    </style>
</head>
<body>

    <img src="logo1.png" style="width: 80px;">
    <h1>Resale IQ</h1>
    
    <div class="card">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="file-input-wrapper">
        <input type="file" id="fileInput" accept="image/*" class="file-input-wrapper">
        
        <button class="btn" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <button class="btn" onclick="document.getElementById('fileInput').click()">📁 Choose File</button>
        
        <img id="preview">
        <button id="analyzeBtn" class="btn analyze-btn">Analyze Item</button>
        
        <div id="status"></div>
        <div id="result"></div>
    </div>

    <script>
        const cameraInput = document.getElementById('cameraInput');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const status = document.getElementById('status');
        const result = document.getElementById('result');

        let selectedFile = null;

        const handleImage = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                analyzeBtn.style.display = 'block';
                status.innerText = "Image selected. Hit Analyze.";
                result.style.display = 'none';
            }
        };

        cameraInput.addEventListener('change', handleImage);
        fileInput.addEventListener('change', handleImage);

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            status.innerText = "Analyzing: Resizing...";
            analyzeBtn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(selectedFile);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const scale = 800 / img.width;
                    canvas.width = 800; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
