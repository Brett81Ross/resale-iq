<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Resale IQ</title>
    
    <link rel="apple-touch-icon" href="logo1.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Resale IQ">

    <style>
        :root { --accent: #0070f3; --bg: #050505; --card: rgba(255, 255, 255, 0.08); }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; line-height: 1.6; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; padding-bottom: 250px; }
        
        /* The Banner */
        #ios-banner { display:none; background: var(--accent); color: white; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 14px; }
        
        .header { text-align: center; margin: 20px 0; }
        .logo { max-width: 140px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333; }
        #result { margin-top: 20px; font-size: 16px; }
        
        /* Fixed Footer */
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: #000; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        
        /* Button Styling */
        .btn { width: 100%; max-width: 400px; padding: 15px; border-radius: 14px; border: none; font-weight: 700; font-size: 16px; cursor: pointer; text-align: center; display: block; }
        .btn-main { background: var(--accent); color: white; }
        .btn-secondary { background: #444; color: white; }
        
        /* The Fix: Instead of display:none, we push them off-screen */
        .file-input { position: absolute; left: -9999px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="ios-banner">Tap "Share" then "Add to Home Screen" to install!</div>

        <div class="header"><img src="logo1.png" class="logo"><h1>Resale IQ</h1></div>
        
        <div class="card">
            <img id="imagePreview" style="width:100%; display:none; border-radius:12px; margin-bottom:10px;">
            <div id="result">Select an option below to start.</div>
        </div>
    </div>

    <div class="action-bar">
        <input type="file" id="cameraInput" class="file-input" accept="image/*" capture="environment">
        <input type="file" id="galleryInput" class="file-input" accept="image/*">
        
        <button class="btn btn-main" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <button class="btn btn-secondary" onclick="document.getElementById('galleryInput').click()">📂 Choose from Gallery</button>
        <button id="analyzeBtn" class="btn btn-main" style="display:none; background:#28a745;" onclick="analyzeImage()">🔍 Get Value</button>
        <button id="copyBtn" class="btn btn-secondary" style="display:none;" onclick="copyListing()">📋 Copy Listing</button>
    </div>

    <script>
        // Check for iOS
        if (/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.navigator.standalone) {
            document.getElementById('ios-banner').style.display = 'block';
        }

        let resizedBase64 = "";

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800;
                    canvas.height = (800 / img.width) * img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resizedBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    document.getElementById('imagePreview').src = canvas.toDataURL();
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('analyzeBtn').style.display = 'block';
                    document.getElementById('result').innerText = "Photo loaded. Tap 'Get Value' to analyze.";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('cameraInput').addEventListener('change', (e) => e.target.files[0] && handleFile(e.target.files[0]));
        document.getElementById('galleryInput').addEventListener('change', (e) => e.target.files[0] && handleFile(e.target.files[0]));

        async function analyzeImage() {
            const btn = document.getElementById('analyzeBtn');
            const res = document.getElementById('result');
            btn.disabled = true; btn.innerText = "Analyzing...";
            try {
                const response = await fetch('/api/analyze', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ image: resizedBase64 })});
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                let text = data.candidates[0].content.parts[0].text;
                
                text = text.replace(/###\s/g, '');
                text = text.replace(/📦 Item Identification/g, '<h3>📦 Item Identification</h3>');
                text = text.replace(/💰 Estimated Market Value/g, '<h3>💰 Estimated Market Value</h3>');
                text = text.replace(/🔗 Live Market Comparisons/g, '<div class="links-box"><h3>🔗 Live Market Comparisons</h3>');
                text = text.replace(/📝 Professional Resale Description/g, '</div><div class="desc-box"><h3>📝 Professional Resale Description</h3>');
                text = text.replace(/💡 Pro-Tips for Selling/g, '</div><div class="tips-box"><h3>💡 Pro-Tips for Selling</h3>');
                text = text.replace(/📋 Listing Data/g, '</div><div class="listing-data-box"><h3>📋 Listing Data</h3>') + '</div>';
                
                res.innerHTML = text.replace(/\n/g, '<br>');
                document.getElementById('copyBtn').style.display = 'block';
            } catch (err) { res.innerText = "Error: " + err.message; } finally { btn.innerText = "🔍 Get Value"; btn.disabled = false; }
        }

        function copyListing() {
            const el = document.querySelector('.listing-data-box');
            if (el) navigator.clipboard.writeText(el.innerText).then(() => alert("Copied!"));
        }
    </script>
</body>
</html>
