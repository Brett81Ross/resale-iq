<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MachZero</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        .app-container { 
            flex: 1; 
            max-width: 400px; 
            width: 100%; 
            margin: 0 auto; 
            padding: 20px; 
            box-sizing: border-box;
        }
        
        .logo-container { text-align: center; margin-bottom: 20px; }
        .main-logo { width: 200px; height: auto; object-fit: contain; }
        
        .app-tagline { 
            color: #888; 
            font-size: 0.9rem; 
            margin-top: -10px; 
            margin-bottom: 20px; 
            letter-spacing: 0.5px;
        }
        
        .card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        
        /* Modal Overlay */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .close-btn { color: #007aff; font-size: 1rem; cursor: pointer; margin-bottom: 20px; display: block; font-weight: bold; }
        
        /* History Styling */
        .history-item { background: #2c2c2e; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; }
        
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-bottom: 10px; transition: opacity 0.2s; }
        .btn-primary { background-color: #007aff; color: white; }
        
        .hidden-uploader { position: absolute; top: 0; left: 0; opacity: 0; width: 0.1px; height: 0.1px; }

        /* Footer */
        .footer {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            border-top: 1px solid #333;
            width: 100%;
            text-align: center;
        }
        .footer-content { display: flex; align-items: center; justify-content: center; gap: 6px; }
        .footer img { height: 14px; width: 14px; object-fit: contain; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="logo-container">
            <img src="logo1.png" alt="MachZero" class="main-logo">
            <div class="app-tagline">Scan items. Calculate profit.</div>
        </div>

        <div class="card">
            <button class="btn btn-primary" onclick="document.getElementById('gallery-input').click()">SELECT PHOTOS</button>
            <button class="btn btn-primary" onclick="document.getElementById('camera-input').click()">TAKE PHOTO</button>
        </div>

        <h3 style="color: #888; font-size: 0.9rem; text-transform: uppercase;">Scan History</h3>
        <div id="history-list"></div>

        <input type="file" id="gallery-input" class="hidden-uploader" accept="image/*">
        <input type="file" id="camera-input" class="hidden-uploader" accept="image/*" capture="environment">
    </div>

    <!-- Detail Modal -->
    <div id="item-modal" class="modal">
        <span class="close-btn" onclick="document.getElementById('item-modal').style.display='none'">← BACK TO DASHBOARD</span>
        <div id="modal-content" style="color: #fff; line-height: 1.6; max-width: 400px; margin: 0 auto;"></div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <img src="logo1.png" alt="MachZero Logo">
            <span>© 2026 MachZero™</span>
        </div>
        <span>Powered by CactusByte</span>
        <span>All Rights Reserved</span>
    </footer>

    <script>
        const historyList = document.getElementById('history-list');
        const modal = document.getElementById('item-modal');
        const modalContent = document.getElementById('modal-content');

        function addToHistory(itemName, analysisText) {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${itemName}</span><span>›</span>`;
            
            div.onclick = () => {
                modalContent.innerHTML = `
                    <div class="card">
                        <h3>Item Evaluation</h3>
                        <p>${analysisText.replace(/\n/g, '<br>')}</p>
                    </div>
                    <div class="card">
                        <h3>Where to Sell</h3>
                        <p>Based on this item, we recommend listing on <b>eBay</b> for maximum reach or <b>Mercari</b> for a faster, easier transaction experience.</p>
                    </div>
                `;
                modal.style.display = 'block';
            };
            historyList.prepend(div);
        }

        async function sendToServer(base64Data) {
            const itemName = "Scan: " + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imagesBase64: [base64Data] })
                });
                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                addToHistory(itemName, rawText);
            } catch (err) {
                alert("Error scanning item: " + err.message);
            }
        }

        document.getElementById('gallery-input').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => sendToServer(event.target.result.split(',')[1]);
            reader.readAsDataURL(e.target.files[0]);
        });
    </script>
</body>
</html>
