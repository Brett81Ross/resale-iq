<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px auto; max-width: 400px; }
        .btn { width: 100%; padding: 15px; background: #222; color: white; border: 1px solid #444; border-radius: 10px; margin-top: 10px; cursor: pointer; font-size: 16px; display: block; }
        .analyze-btn { background: #0070f3 !important; font-weight: bold; margin-top: 20px; }
        .copy-btn { background: #28a745 !important; margin-top: 10px; display: none; }
        #preview { width: 100%; border-radius: 10px; margin-top: 15px; display: none; }
        #status { margin-top: 15px; font-size: 14px; color: #aaa; }
        #result { margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 10px; text-align: left; white-space: pre-wrap; color: #ddd; display: none; }
    </style>
</head>
<body>

    <img src="logo1.png" style="width: 80px;">
    <h1>Resale IQ</h1>
    
    <div class="card">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        
        <button class="btn" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <button class="btn" onclick="document.getElementById('fileInput').click()">📁 Choose File</button>
        
        <img id="preview">
        <button id="analyzeBtn" class="btn analyze-btn">Analyze Item</button>
        
        <div id="status"></div>
        <div id="result"></div>
        <button id="copyBtn" class="btn copy-btn">📋 Copy Listing Text</button>
    </div>

    <script>
        const cameraInput = document.getElementById('cameraInput');
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const copyBtn = document.getElementById('copyBtn');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const preview = document.getElementById('preview');

        let currentFile = null;

        function handleFile(file) {
            if (!file) return;
            currentFile = file;
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            status.innerText = "Image selected. Tap 'Analyze Item'.";
            result.style.display = 'none';
            copyBtn.style.display = 'none';
        }

        cameraInput.onchange = (e) => handleFile(e.target.files[0]);
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        analyzeBtn.onclick = async () => {
            if (!currentFile) return alert("Select a photo first!");
            status.innerText = "Analyzing...";
            analyzeBtn.disabled = true
