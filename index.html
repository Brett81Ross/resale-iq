<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        
        /* Top Navigation Header Block */
        .app-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            margin-bottom: 20px;
            padding: 5px 0;
        }
        .header-title { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
        .faq-top-btn { 
            background: #111; 
            border: 1px solid #2a2a2a; 
            color: #ccc; 
            padding: 8px 14px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        .faq-top-btn:hover { background: #222; border-color: #0070f3; color: #fff; }

        /* Logo Alignment */
        .logo-container { width: 100%; overflow: hidden; margin-bottom: 20px; display: flex; justify-content: center; }
        .logo { width: 100%; max-width: 320px; height: auto; object-fit: contain; }
        
        /* Dashboard Card Layout */
        .dashboard { 
            background: linear-gradient(145deg, #1e1e1e, #121212); 
            padding: 22px 16px; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid #2a2a2a;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .dashboard-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .dashboard-value { 
            margin: 0; 
            font-size: 32px; 
            font-weight: 700; 
            letter-spacing: -0.5px;
            color: #28a745; 
            text-shadow: 0 0 10px rgba(40, 167, 69, 0.2);
        }
        
        .section-title { font-size: 18px; font-weight: 600; margin: 30px 0 15px 0; text-align: center; color: #fff; }
        
        /* Input Field Design with Inline Info Accessors */
        .input-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
        input { width: 100%; padding: 16px 50px 16px 16px; border-radius: 10px; border: 1px solid #2a2a2a; font-size: 16px; background: #111; color: #fff; box-sizing: border-box; outline: none; }
        input::placeholder { color: #555; }
        input:focus { border-color: #0070f3; }
        
        .info-toggle-btn { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: transparent; color: #0070f3; border: none; font-size: 20px; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; }
        .dashboard .info-toggle-btn { top: 25px; transform: none; }
        
        /* Standard Action Buttons */
        .btn { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 10px; border: none; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-sizing: border-box; }
        .select-btn { background: #0070f3; }
        .camera-btn { background: #28a745; }
        .expense-btn { background: #f39c12; margin-top: 5px; }
        
        /* Bottom Drawer Panel Layout */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: flex-end; }
        .modal-content { background: #161616; width: 100%; max-width: 420px; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 25px; box-sizing: border-box; text-align: left; border-top: 1px solid #2a2a2a; transform: translateY(100%); transition: transform 0.3s ease-out; max-height: 80vh; overflow-y: auto; }
        .modal-content.open { transform: translateY(0); }
        .modal-content h4 { margin-top: 0; color: #0070f3; font-size: 18px; margin-bottom: 12px; }
        .modal-content ul { padding-left: 20px; margin: 0 0 20px 0; }
        .modal-content li { margin-bottom: 10px; color: #ccc; font-size: 14px; line-height: 1.5; }
        .close-modal-btn { width: 100%; padding: 14px; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: 600; text-align: center; }

        #gallery { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; width: 100%; justify-content: center; }
        #gallery img { width: 75px; height: 75px; object-fit: cover; border-radius: 8px; border: 1px solid #222; }
        
        /* Interactive Output Results Engine + Visual Error Banners */
        #result { display: none; background: #111; padding: 16px; border-radius: 10px; margin-top: 20px; text-align: left; font-size: 14px; border: 1px solid #222; line-height: 1.6; width: 100%; box-sizing: border-box; white-space: pre-wrap; }
        #result.error-state { border-color: #dc3545; background: rgba(220, 53, 69, 0.05); color: #ff808b; }
        .retry-action-link { color: #0070f3; font-weight: bold; text-decoration: underline; cursor: pointer; display: block; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <span class="header-title">Resale IQ</span>
            <button class="faq-top-btn" onclick="openHelpModal('app')">❓ Help FAQ</button>
        </div>

        <div class="logo-container">
            <img src="logo1.png" class="logo" alt="Resale IQ">
        </div>
        
        <div class="dashboard">
            <div class="dashboard-label">Net Profit</div>
            <div class="dashboard-value">$<span id="netProfit">0.00</span></div>
            <button class="info-toggle-btn" onclick="openHelpModal('profit')">ⓘ</button>
        </div>

        <div class="input-wrapper">
            <input type="number" id="costInput" placeholder="Sourcing Cost ($)" inputmode="decimal">
            <button class="info-toggle-btn" onclick="openHelpModal('sourcing')">ⓘ</button>
        </div>

        <button class="btn select-btn" onclick="document.getElementById('fileInput').click()">📁 Select Photos</button>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">

        <button class="btn camera-btn" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">

        <div class="section-title">Add Expense</div>
        
        <div class="input-wrapper">
            <input type="text" id="expDesc" placeholder="Description (e.g., Mileage)">
        </div>
        <div class="input-wrapper">
            <input type="number" id="expAmt" placeholder="Amount ($)" inputmode="decimal">
        </div>
        <button class="btn expense-btn" onclick="addExpense()">Add Expense</button>
        
        <div id="gallery"></div>
        <div id="result"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeHelpModal()">
        <div class="modal-content" id="modalContent" onclick="event.stopPropagation()">
            <div id="modalTargetContent"></div>
            <button class="close-modal-btn" onclick="closeHelpModal()">Got It</button>
        </div>
    </div>

    <script>
        let allImages = [];
        let currentSourcingCostCache = 0;

        // Global Help Guides Core Matrix
        const guides = {
            sourcing: `
                <h4>💡 Master Sourcing Cost Guide</h4>
                <ul>
                    <li><b>Thrift & Garage Sales:</b> Use the exact register price. If you bought a bundle, divide the total receipt cost by the number of usable items.</li>
                    <li><b>Auctions & Bulk Lots:</b> Add the item cost, buyer’s premiums, taxes, and shipping costs altogether, then divide by the total items to find the cost per unit.</li>
                    <li><b>Found, Gifted, or Free Items:</b> Enter <b>$0</b>. If you spent money on gas to pick it up, log that down below under general expenses instead.</li>
                    <li><b>Repairs & Cleaning:</b> If you had to buy a replacement part or specific cleaner just for this item, add that directly to this sourcing cost.</li>
                </ul>
            `,
            profit: `
                <h4>📊 Net Profit Calculation Breakdown</h4>
                <ul>
                    <li><b>The Formula:</b> Gross Revenue minus Cost of Goods Sold (COGS) minus your Operational Expenses.</li>
                    <li><b>Gross Revenue:</b> The total projected listing or final checkout sales numbers generated from item analysis scans.</li>
                    <li><b>COGS (Sourcing Costs):</b> The base acquisition capital logged when items were parsed into inventory processing.</li>
                    <li><b>Expenses:</b> Extra structural business operations tracking overhead liabilities like mileage tax credits, tools, or bubble wrap.</li>
                </ul>
            `,
            app: `
                <h4>📱 Resale IQ Quick Start Guide & FAQ</h4>
                
                <h4>How do I scan inventory?</h4>
                <ul>
                    <li>Enter what you paid for the item in the <b>Sourcing Cost</b> box, then click <b>Select Photos</b> or <b>Take Photo</b> to run the AI engine.</li>
                </ul>

                <h4>What happens after a scan?</h4>
                <ul>
                    <li>The Gemini 3.5 engine analyzes the graphics to pull pricing data, sales run-rates, optimization strategies, and build an ad copy layout.</li>
                </ul>

                <h4>How do expenses affect my profit metrics?</h4>
                <ul>
                    <li>Adding business expenses (like packaging, fuel, tape, or label printers) subtracts instantly from the <b>Net Profit Card</b>.</li>
                </ul>
            `
        };

        function openHelpModal(type) {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            document.getElementById('modalTargetContent').innerHTML = guides[type] || '';
            
            overlay.style.display = 'flex';
            setTimeout(() => { content.classList.add('open'); }, 10);
        }

        function closeHelpModal() {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            content.classList.remove('open');
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }

        // Advanced Image Optimization & Edge Check Pre-processing Engine
        async function handleFiles(files) {
            currentSourcingCostCache = document.getElementById('costInput').value || 0;
            allImages = []; 
            
            const gallery = document.getElementById('gallery');
            const resultBox = document.getElementById('result');
            
            gallery.innerHTML = "";
            resultBox.className = ""; // Remove any residual error color blocks
            resultBox.style.display = "none";
            
            const fileArray = Array.from(files);
            if (fileArray.length === 0) return;

            for (const file of fileArray) {
                // Safeguard against unsupported raw system media dumps
                if (!file.type.startsWith('image/')) {
                    displayErrorUI("Invalid format detected. Please select standard images.");
                    return;
                }

                try {
                    const b64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onerror = () => reject(new Error("File conversion aborted."));
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onerror = () => reject(new Error("Corrupted media architecture."));
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                const MAX_WIDTH = 1024; // Balanced dynamic resolution capping
                                let width = img.width;
                                let height = img.height;

                                if (width > MAX_WIDTH) {
                                    height *= MAX_WIDTH / width;
                                    width = MAX_WIDTH;
                                }

                                canvas.width = width; 
                                canvas.height = height;
                                
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, width, height);
                                
                                // Clean dynamic downscale array compilation
                                const base64Result = canvas.toDataURL('image/jpeg', 0.75).split(',')[1];
                                resolve(base64Result);
                            };
                            img.src = e.target.result;
                        };
                        reader.readAsDataURL(file);
                    });
                    
                    allImages.push(b64);
                    
                    const thumb = document.createElement('img');
                    thumb.src = `data:image/jpeg;base64,${b64}`;
                    gallery.appendChild(thumb);
                    
                } catch (processingErr) {
                    displayErrorUI(`Pre-processing Failure: ${processingErr.message}`);
                    return;
                }
            }
            runAnalysis(currentSourcingCostCache);
        }

        // Live API Execution Loop with Connection Timeouts & Error Banners
        async function runAnalysis(cost) {
            const resultBox = document.getElementById('result');
            resultBox.className = ""; 
            resultBox.style.display = 'block';
            resultBox.innerText = "Analyzing item properties with Gemini 3.5...";
            
            // AbortController setup to catch hang-ups or dead connectivity
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 25000); // 25 second hard gateway drop ceiling
            
            try {
                const res = await fetch('/api/analyze', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ imagesBase64: allImages }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Server processing iteration fault.");
                
                const text = data.candidates[0].content.parts[0].text;
                resultBox.innerText = text;
                
                const priceMatch = text.match(/\$?(\d+)/);
                const estimatedSalePrice = priceMatch ? parseFloat(priceMatch[1]) : 0;
                
                let h = JSON.parse(localStorage.getItem('resaleHistory') || '[]');
                h.unshift({ text, cost: parseFloat(cost), price: estimatedSalePrice, status: 'Active', timestamp: Date.now() });
                localStorage.setItem('resaleHistory', JSON.stringify(h));
                
                calculateFinances();
            } catch (err) {
                clearTimeout(timeoutId);
                if (err.name === 'AbortError') {
                    displayErrorUI("Network timeout: The connection took too long to respond. Please check your signal strength and retry.");
                } else {
                    displayErrorUI(`Execution Error: ${err.message || "Failed to contact analysis server."}`);
                }
            }
        }

        // Centralized Visual Error UI Renderer
        function displayErrorUI(message) {
            const resultBox = document.getElementById('result');
            resultBox.style.display = 'block';
            resultBox.className = "error-state";
            resultBox.innerHTML = `⚠️ <b>Resale IQ Error Encountered</b><br>${message}<span class="retry-action-link" onclick="runAnalysis(currentSourcingCostCache)">🔄 Tap here to retry analysis</span>`;
        }

        function addExpense() {
            const desc = document.getElementById('expDesc').value.trim();
            const amt = parseFloat(document.getElementById('expAmt').value) || 0;
            if (!desc || amt <= 0) return;

            let exps = JSON.parse(localStorage.getItem('expenses') || '[]');
            exps.push({ desc, amt, timestamp: Date.now() });
            localStorage.setItem('expenses', JSON.stringify(exps));
            
            document.getElementById('expDesc').value = "";
            document.getElementById('expAmt').value = "";
            
            calculateFinances();
            alert(`Logged expense: "${desc}" for $${amt.toFixed(2)}`);
        }

        function calculateFinances() {
            const items = JSON.parse(localStorage.getItem('resaleHistory') || '[]');
            const exps = JSON.parse(localStorage.getItem('expenses') || '[]');
            
            let accumulatedRevenue = 0;
            let totalCogs = 0;
            let operationalExpenses = 0;

            items.forEach(item => {
                accumulatedRevenue += item.price;
                totalCogs += item.cost;
            });

            exps.forEach(e => {
                operationalExpenses += e.amt;
            });

            const trueNetProfit = accumulatedRevenue - totalCogs - operationalExpenses;
            document.getElementById('netProfit').innerText = trueNetProfit.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        document.getElementById('fileInput').onchange = (e) => handleFiles(e.target.files);
        document.getElementById('cameraInput').onchange = (e) => handleFiles(e.target.files);
        window.onload = calculateFinances;
    </script>
</body>
</html>
