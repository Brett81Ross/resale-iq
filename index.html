<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResaleIQ</title>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100%; background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; }
        .app-container { max-width: 480px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; box-sizing: border-box; }
        .brand-header { width: 100%; text-align: center; padding: 20px 0; background-color: #000; }
        .main-logo { width: 150px; height: 150px; object-fit: contain; margin: 0 auto; display: block; }
        .promo-banner { border-bottom: 1px solid #333; color: #ffffff; text-align: center; padding: 12px; font-size: 0.85rem; font-weight: 600; }
        .content-area { flex: 1; padding: 16px; }
        
        .profit-card { background-color: #161616; border-radius: 16px; padding: 24px 16px; text-align: center; position: relative; margin-bottom: 16px; }
        .card-title { color: #8a8a8f; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .profit-amount { color: #2ecc71; font-size: 2.5rem; font-weight: bold; margin: 0; }
        .info-trigger { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #007aff; font-size: 1.2rem; cursor: pointer; padding: 8px; }
        
        .input-group { position: relative; margin-bottom: 16px; }
        .app-input { width: 100%; background-color: #161616; border: 1px solid #333; border-radius: 12px; padding: 16px; font-size: 1rem; color: #ffffff; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; margin-bottom: 12px; color: #ffffff; }
        .btn-blue { background-color: #007aff; }
        .btn-green { background-color: #34c759; }
        .btn-orange { background-color: #ff9f0a; margin-top: 8px; }
        
        .hidden-uploader { position: absolute !important; opacity: 0 !important; width: 1px !important; height: 1px !important; overflow: hidden !important; }
        .section-label { text-align: center; font-size: 1.1rem; font-weight: 600; margin: 24px 0 16px 0; color: #ffffff; }
        
        #status-display { background-color: #1c1c1e; border-radius: 12px; padding: 20px; margin: 16px 0; font-size: 0.95rem; line-height: 1.5; color: #ffffff; border-left: 4px solid #007aff; display: none; white-space: pre-wrap; }
        
        #inventory-log { margin-top: 16px; }
        .log-item { background-color: #161616; border-radius: 12px; padding: 16px; margin-bottom: 8px; border-left: 4px solid #34c759; font-size: 0.9rem; color: #ffffff; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-box { background-color: #1c1c1e; border-radius: 16px; padding: 24px; max-width: 400px; width: 100%; }
        .modal-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 16px; color: #007aff; }
        .modal-body { font-size: 0.95rem; line-height: 1.5; margin-bottom: 24px; color: #e0e0e0; }
        .modal-close { background-color: #333; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; }
        .app-footer { text-align: center; font-size: 0.8rem; color: #555; padding: 20px; margin-top: auto; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand-header">
            <img src="logo1.png" alt="ResaleIQ" class="main-logo">
            <div class="promo-banner">100% FREE for Early Testers • ⚡️PRO Version Coming Soon</div>
        </div>

        <div class="content-area">
            <div class="profit-card">
                <div class="card-title">Net Profit</div>
                <p class="profit-amount">$0.00</p>
                <button class="info-trigger" onclick="showHelp('profit')">ⓘ</button>
            </div>

            <div class="input-group">
                <input type="number" class="app-input" placeholder="Sourcing Cost ($)">
                <button class="info-trigger" onclick="showHelp('cost')">ⓘ</button>
            </div>

            <input type="file" id="file-gallery-input" class="hidden-uploader" accept="image/*">
            <input type="file" id="camera-capture-input" class="hidden-uploader" accept="image/*" capture="environment">

            <button class="btn btn-blue" id="gallery-trigger-btn">Select Photos</button>
            <button class="btn btn-green" id="camera-trigger-btn">Take Photo</button>

            <div id="status-display"></div>

            <div class="section-label">Add Expense</div>
            <div class="input-group"><input type="text" class="app-input" placeholder="Description (e.g., Mileage)"></div>
            <div class="input-group"><input type="number" class="app-input" placeholder="Amount ($)"></div>
            <button class="btn btn-orange">Add Expense</button>

            <div class="section-label">Inventory Log</div>
            <div id="inventory-log"></div>
        </div>
        
        <footer class="app-footer">&copy; 2026 ResaleIQ by CactusByte. All Rights Reserved.</footer>
    </div>

    <div class="modal-overlay" id="help-modal">
        <div class="modal-box">
            <div class="modal-title" id="help-title">Help</div>
            <div class="modal-body" id="help-body"></div>
            <button class="modal-close" onclick="closeHelp()">Close</button>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyBUYZLzUhjrBCim3wP0bI9t4oxCH5nmORY';

        function showHelp(topic) {
            const modal = document.getElementById('help-modal');
            const title = document.getElementById('help-title');
            const body = document.getElementById('help-body');
            if (topic === 'profit') {
                title.textContent = "About Net Profit";
                body.textContent = "Net Profit is your total take-home earnings calculated automatically.";
            } else if (topic === 'cost') {
                title.textContent = "Sourcing Cost";
                body.textContent = "Enter the exact amount you paid out of pocket for the item.";
            }
            modal.style.display = 'flex';
        }
        function closeHelp() { document.getElementById('help-modal').style.display = 'none'; }

        document.getElementById('gallery-trigger-btn').addEventListener('click', () => document.getElementById('file-gallery-input').click());
        document.getElementById('camera-trigger-btn').addEventListener('click', () => {
            const input = document.getElementById('camera-capture-input');
            input.value = "";
            input.click();
        });

        document.getElementById('file-gallery-input').addEventListener('change', (e) => startUpload(e.target.files[0]));
        document.getElementById('camera-capture-input').addEventListener('change', (e) => startUpload(e.target.files[0]));

        async function startUpload(file) {
            if (!file) return;
            const statusDiv = document.getElementById('status-display');
            statusDiv.style.display = 'block';
            statusDiv.style.borderColor = '#007aff';
            statusDiv.textContent = "Step 1: Preparing image for analysis...";

            try {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await img.decode();

                const canvas = document.createElement('canvas');
                const scale = Math.min(800 / img.width, 1);
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const base64Data = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                statusDiv.textContent = "Step 2: Connecting to Gemini AI...";
                
                // Using gemini-2.0-flash as it is the current supported stable endpoint
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Analyze this item and provide the response in this exact order: 1. Item Description, 2. Market Value, 3. Where to Sell, 4. Optimized Listing (for copy-pasting), 5. Any other relevant details." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                            ]
                        }]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} - Check your API key or model permissions.`);
                }
                
                const data = await response.json();
                const resultText = data.candidates[0].content.parts[0].text;
                
                statusDiv.style.borderColor = '#34c759';
                statusDiv.textContent = resultText;
                
                const logDiv = document.getElementById('inventory-log');
                const newEntry = document.createElement('div');
                newEntry.className = 'log-item';
                newEntry.textContent = resultText;
                logDiv.prepend(newEntry);
                
            } catch (err) {
                statusDiv.style.borderColor = "#ff3b30";
                statusDiv.textContent = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
