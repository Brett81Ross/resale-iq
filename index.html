<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #333; color: #fff; font-size: 16px; cursor: pointer; }
        .analyze-btn { background: #0070f3; font-weight: bold; }
        #preview { width: 100%; border-radius: 10px; margin: 10px 0; display: none; }
        #result { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; white-space: pre-wrap; font-size: 14px; }
        #status { margin-top: 10px; color: #ffcc00; }
    </style>
</head>
<body>
    <div class="container">
        <input type="file" id="uploadInput" accept="image/*" style="display:none;">
        <button class="btn" onclick="document.getElementById('uploadInput').click()">📁 Upload File</button>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
        <button class="btn" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <img id="preview">
        <button id="analyzeBtn" class="btn analyze-btn">Analyze Item</button>
        <div id="status"></div>
        <div id="result"></div>
    </div>
    <script>
        const preview = document.getElementById('preview'), status = document.getElementById('status'), result = document.getElementById('result');
        const handle = (e) => { const reader = new FileReader(); reader.onload = (ev) => { preview.src = ev.target.result; preview.style.display = 'block'; }; reader.readAsDataURL(e.target.files[0]); };
        document.getElementById('uploadInput').onchange = handle;
        document.getElementById('cameraInput').onchange = handle;

        document.getElementById('analyzeBtn').onclick = async () => {
            if (!preview.src) return alert("Select photo first!");
            status.innerText = "Analyzing...";
            const img = new Image(); img.src = preview.src; await img.decode();
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = img.height * (400 / img.width);
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            // Quality 0.2 is extremely small, perfect for constrained environments
            const base64 = canvas.toDataURL('image/jpeg', 0.2).split(',')[1];

            try {
                const res = await fetch('/api/analyze', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ imageBase64: base64 }) });
                const data = await res.json();
                if (res.ok) { result.innerText = data.candidates[0].content.parts[0].text; result.style.display = 'block'; status.innerText = "Done!"; }
                else { status.innerText = "Error: " + data.error; }
            } catch (e) { status.innerText = "Error: " + e.message; }
        };
    </script>
</body>
</html>
