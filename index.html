<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Mode</title>
    <style>
        body { background: #000; color: white; padding: 20px; font-family: sans-serif; text-align: center; }
        .preview { max-width: 300px; margin: 20px 0; border: 2px solid white; display: none; }
    </style>
</head>
<body>
    <h1>Test App</h1>
    <input type="file" id="fileInput" accept="image/*">
    <img id="imagePreview" class="preview">
    <p id="status">Select an image to test.</p>

    <script>
        const input = document.getElementById('fileInput');
        const img = document.getElementById('imagePreview');
        const status = document.getElementById('status');

        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                status.innerText = "Processing...";
                const reader = new FileReader();
                reader.onload = (e) => {
                    img.src = e.target.result;
                    img.style.display = 'block';
                    status.innerText = "Success! Image loaded.";
                };
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
