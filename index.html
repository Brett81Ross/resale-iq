<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <link rel="apple-touch-icon" href="logo1.png">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px 0; }
        img.preview { width: 100%; border-radius: 12px; display: none; margin-bottom: 10px; }
        
        .button-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .button-row button { flex: 1; }
        
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-main { background: #0070f3; color: white; }
        .btn-secondary { background: #333; color: white; }
        .btn-success { background: #28a745; color: white; }
        
        #result { margin-top: 20px; text-align: left; line-height: 1.5; font-size: 16px; }
    </style>
</head>
<body>
    <img src="logo1.png" style="width: 80px; margin-bottom: 10px;">
    <h1 style="margin-top: 0;">Resale IQ</h1>
    
    <div class="card">
        <img id="preview" class="preview">
        
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
        <input type="file" id="galleryInput" accept="image/*" style="display:none">
        
        <div class="button-row">
            <button class="btn-main" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
            <button class="btn-secondary" onclick="document.getElementById('galleryInput').click()">📂 Choose File</button>
        </div>
        
        <button id="analyzeBtn" class="btn-success" style="display:none;" onclick="analyze()">🔍 Get Value</button>
        <button id="copyBtn" class="btn-secondary" style="display:none;" onclick="copyListing()">📋 Copy Listing</button>
    </div>
    
    <div id="result"></div>

    <script>
        let base64 = "";

        // The rock-solid file handler that worked previously
        function processPhoto(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Reset the input so you can pick the same file again if needed
            event.target.value = '';

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Shrink the image so Vercel doesn't crash on upload
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    base64 = dataUrl.split(',')[1];

                    // Show the photo and the Analyze button
                    document.getElementById('preview').src = dataUrl;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('analyzeBtn').style.display = 'block';
                    document.getElementById('copyBtn').style.display = 'none';
                    document.getElementById('result').innerText = ""; 
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Attach the listener exactly like the working test version
        document.getElementById('cameraInput').addEventListener('change', processPhoto);
        document.getElementById('galleryInput').addEventListener('change', processPhoto);

        // The Analyze Function
        async function analyze() {
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('analyzeBtn');
            
            btn.disabled = true;
            resultDiv.innerText = "Analyzing... please wait.";
            
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ image: base64 })
                });

                if (!res.ok) {
                    throw new Error(`Server connection failed (Code: ${res.status}). Check your backend API file.`);
                }

                const data = await res.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                let text = data.candidates[0].content.parts[0].text;
                resultDiv.innerHTML = text.replace(/###\s/g, '').replace(/\n/g, '<br>');
                document.getElementById('copyBtn').style.display = 'block';
                
            } catch (error) {
                resultDiv.innerHTML = `<b>Error:</b> ${error.message}`;
            } finally {
                btn.disabled = false;
            }
        }

        function copyListing() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard!"));
        }
    </script>
</body>
</html>
