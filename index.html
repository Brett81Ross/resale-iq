<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MachZero Inventory</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: #1f1f1f;
            padding: 1rem;
            text-align: center;
            border-bottom: 2px solid #333;
        }
        main {
            padding: 20px;
            flex: 1;
        }
        .upload-section {
            border: 2px dashed #444;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .upload-section:hover {
            border-color: #007bff;
        }
        input[type="file"] { display: none; }
        .instruction-text {
            font-size: 1.1rem;
            color: #bbb;
            margin: 0;
            font-weight: bold;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
        #analysis-modal {
            display: none;
            background: #252525;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            border: 1px solid #444;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #1f1f1f;
            font-size: 0.8rem;
            color: #777;
        }
        .logo-img {
            width: 100px;
            height: auto;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<header>
    <img src="logo1.png" alt="MachZero Logo" class="logo-img">
    <h1>MachZero</h1>
</header>

<main>
    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <p class="instruction-text">Tap to upload item for valuation</p>
        <input type="file" id="fileInput" accept="image/*" capture="environment">
    </div>

    <div id="analysis-modal">
        <h3>Analysis Results</h3>
        <p id="resultText">Waiting for image...</p>
    </div>
</main>

<footer>
    <p>&copy; 2026 MachZero Systems. All rights reserved.</p>
</footer>

<script>
    document.getElementById('fileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            document.getElementById('analysis-modal').style.display = 'block';
            document.getElementById('resultText').innerText = 'Analyzing image for market valuation...';
            // Integration logic for backend analysis would go here
        }
    });
</script>

</body>
</html>
