<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResaleIQ</title>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { max-width: 400px; width: 100%; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        /* Logo enlarged as requested */
        .main-logo { width: 250px; height: auto; object-fit: contain; }
        
        .profit-card { background: #1c1c1e; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 15px; border: 1px solid #333; position: relative; }
        .profit-label { color: #888; font-size: 0.9rem; margin-bottom: 5px; }
        .profit-amount { color: #34c759; font-size: 2.5rem; font-weight: bold; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #1c1c1e; color: #fff; box-sizing: border-box; padding-right: 45px; }
        
        .embedded-info { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #333; border: none; color: #fff; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        
        #info-box { background: #1c1c1e; border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #444; display: none; font-size: 0.9rem; line-height: 1.5; color: #ccc; }
        .info-header { color: #007aff; font-weight: bold; margin-bottom: 5px; }
        
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 1rem; }
        .btn-blue { background-color: #007aff; color: white; }
        .btn-green { background-color: #34c759; color: white; }
        .btn-orange { background-color: #ff9500; color: white; }
        
        .section-title { font-size: 1.2rem; margin: 20px 0 10px 0; font-weight: bold; }
        .hidden-uploader { display: none; }
        #status-display { margin-top: 15px; background: #1c1c1e; padding: 15px; border-radius: 10px; white-space: pre-wrap; font-size: 0.9rem; border-left: 4px solid #007aff; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="logo-container">
            <img src="logo1.png" alt="ResaleIQ" class="main-logo">
        </div>

        <div class="profit-card">
            <button class="embedded-info" onclick="showInfo('profit')">i</button>
            <div class="profit-label">NET PROFIT</div>
            <div class="profit-amount" id="net-profit">$0.00</div>
        </div>

        <div id="info-box"></div>

        <div class="input-group">
            <input type="number" id="sourcing-cost" placeholder="Sourcing Cost ($)">
            <button class="embedded-info" onclick="showInfo('cost')">i</button>
        </div>

        <input type="file" id="file-input" class="hidden-uploader" accept="image/*">
        <button class="btn btn-blue" id="gallery-btn">Select Photos</button>
        <button class="btn btn-green" id="camera-btn">Take Photo</button>

        <div class="section-title">Add Expense</div>
        <input type="text" id="expense-desc" placeholder="Description (e.g., Mileage)">
        <input type="number" id="expense-amount" placeholder="Amount ($)">
        <button class="btn btn-orange">Add Expense</button>

        <div class="section-title">Inventory Log</div>
        <div id="status-display">Waiting for analysis...</div>
    </div>

    <script>
        const API_KEY = 'AIzaSyB-IpUGZonHge90wzlG8ydK34Fms8Dvf6U';

        function showInfo(type) {
            const box = document.getElementById('info-box');
            box.style.display = 'block';
            if (type === 'profit') {
                box.innerHTML = `<div class="info-header">What is Net Profit?</div>
                    <ul>
                        <li>Total Revenue: Your final sale price.</li>
                        <li>Sourcing Cost: What you paid to acquire the item.</li>
                        <li>Expenses: Fees, shipping, or travel costs.</li>
                        <li>Formula: Sale Price - (Cost + Expenses) = Profit.</li>
                    </ul>`;
            } else if (type === 'cost') {
                box.innerHTML = `<div class="info-header">Sourcing Cost Guide</div>
                    <ul>
                        <li>Enter the exact amount paid for the item.</li>
                        <li>Include tax paid at the time of purchase.</li>
                        <li>Do not include potential resale fees here.</li>
                        <li>Keep receipts organized for tax purposes.</li>
                    </ul>`;
            }
        }

        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status-display');

        document.getElementById('gallery-btn').addEventListener('click', () => fileInput.click());
        document.getElementById('camera-btn').addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => upload(e.target.files[0]));

        async function upload(file) {
            status.textContent = "Analyzing item...";
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Analyze this item and provide: 1. Description, 2. Estimated Market Value, 3. Suggested Resale Price." }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }]
                        })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    status.textContent = data.candidates[0].content.parts[0].text;
                } catch (err) {
                    status.textContent = "Error: " + err.message;
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
