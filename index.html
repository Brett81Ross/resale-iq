<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px auto; max-width: 400px; }
        .btn { width: 100%; padding: 15px; background: #222; color: white; border: 1px solid #444; border-radius: 10px; margin-top: 10px; cursor: pointer; font-size: 16px; display: block; }
        .analyze-btn { background: #0070f3 !important; font-weight: bold; margin-top: 20px; display: block; }
        #preview { width: 100%; border-radius: 10px; margin-top: 15px; display: none; }
        #status { margin-top: 15px; font-size: 14px; color: #888; }
        #result { margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 10px; text-align: left; white-space: pre-wrap; color: #ddd; display: none; }
    </style>
</head>
<body>

    <img src="logo1.png" style="width: 80px;">
    <h1>Resale IQ</h1>
    
    <div class="card">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        
        <button class="btn" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <button class="btn" onclick="document.getElementById('fileInput').click()">📁 Choose File</button>
        
        <img id="preview">
        
        <button id="analyzeBtn" class="btn analyze-btn">Analyze Item</button>
        
        <div id="status"></div>
        <div id="result"></div>
    </div>

    <script>
        const cameraInput = document.getElementById('cameraInput');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const status = document.getElementById('status');
        const result = document.getElementById('result');

        let selectedFile = null;

        const handleImage = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                status.innerText = "Image loaded. Tap 'Analyze Item' to begin.";
                result.style.display = 'none';
            }
        };

        cameraInput.addEventListener('change', handleImage);
        fileInput.addEventListener('change', handleImage);

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                status.innerText = "Please select or take a photo first!";
                return;
            }

            status.innerText = "Analyzing: Processing image...";
            analyzeBtn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(selectedFile);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const scale = 800 / img.width;
                    canvas.width = 800; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    
                    status.innerText = "Analyzing: Connecting to Gemini 3.5...";
                    try {
                        const response = await fetch('/api/analyze', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ imageBase64: base64 })
                        });
                        
                        const data = await response.json();
                        if (data.candidates && data.candidates[0].content) {
                            result.innerText = data.candidates[0].content.parts[0].text;
                            result.style.display = 'block';
                            status.innerText = "Analysis Complete!";
                        } else {
                            status.innerText = "Error: AI response empty.";
                        }
                    } catch (err) {
                        status.innerText = "Error: Backend unreachable.";
                    } finally {
                        analyzeBtn.disabled = false;
                    }
                };
            };
        });
    </script>
</body>
</html>
