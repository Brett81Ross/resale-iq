<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResaleIQ</title>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100%; background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; }
        .brand-header { width: 100%; }
        .main-logo { width: 100%; height: auto; aspect-ratio: 1 / 1; display: block; object-fit: contain; background-color: #ffffff; }
        .promo-banner { background-color: transparent; border-bottom: 1px solid #333; color: #ffffff; text-align: center; padding: 12px; font-size: 0.85rem; font-weight: 600; }
        .app-wrapper { flex: 1; padding: 16px; max-width: 480px; width: 100%; margin: 0 auto; box-sizing: border-box; }
        .profit-card { background-color: #161616; border-radius: 16px; padding: 24px 16px; text-align: center; position: relative; margin-bottom: 16px; }
        .profit-amount { color: #2ecc71; font-size: 2.5rem; font-weight: bold; margin: 0; }
        .info-trigger { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #007aff; font-size: 1.2rem; cursor: pointer; padding: 8px; }
        .input-group { position: relative; margin-bottom: 16px; }
        .app-input { width: 100%; background-color: #161616; border: 1px solid #333; border-radius: 12px; padding: 16px; font-size: 1rem; color: #ffffff; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; margin-bottom: 12px; color: #ffffff; }
        .btn-blue { background-color: #007aff; }
        .btn-green { background-color: #34c759; }
        .btn-orange { background-color: #ff9f0a; margin-top: 8px; }
        .hidden-uploader { position: absolute !important; opacity: 0 !important; width: 1px !important; height: 1px !important; overflow: hidden !important; }
        .section-label { text-align: center; font-size: 1.1rem; font-weight: 600; margin: 24px 0 16px 0; }
        #status-display { background-color: #1c1c1e; border-radius: 12px; padding: 20px; margin: 16px 0; font-size: 0.95rem; line-height: 1.5; border-left: 4px solid #007aff; display: none; white-space: pre-wrap; }
        .pulsing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .log-item { background-color: #161616; border-radius: 12px; padding: 16px; margin-bottom: 8px; border-left: 4px solid #34c759; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="brand-header">
        <img src="logo1.png" alt="ResaleIQ" class="main-logo">
        <div class="promo-banner">100% FREE for Early Testers</div>
    </div>

    <div class="app-wrapper">
        <div class="profit-card">
            <div style="color:#8a8a8f; font-size:0.8rem;">NET PROFIT</div>
            <p class="profit-amount">$0.00</p>
        </div>

        <input type="file" id="file-input" class="hidden-uploader" accept="image/*">
        <button class="btn btn-blue" onclick="document.getElementById('file-input').click()">Analyze Item</button>

        <div id="status-display"></div>
        <div id="inventory-log"></div>
    </div>

    <script>
        const API_KEY = 'AIzaSyCp54LGv8iu-IxPbpaoakU83OZNMheErCA';

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const statusDiv = document.getElementById('status-display');
            statusDiv.style.display = 'block';
            statusDiv.classList.add('pulsing');
            statusDiv.textContent = "Processing image with AI...";

            // Convert to Base64
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Image = reader.result.split(',')[1];
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Analyze this item for resale: Provide 1. Item Name, 2. Est. Market Value, 3. Selling Advice, 4. Listing Description." },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    const result = data.candidates[0].content.parts[0].text;
                    
                    statusDiv.classList.remove('pulsing');
                    statusDiv.textContent = result;
                    
                    const log = document.getElementById('inventory-log');
                    const entry = document.createElement('div');
                    entry.className = 'log-item';
                    entry.textContent = result;
                    log.prepend(entry);
                } catch (err) {
                    statusDiv.textContent = "Error: " + err.message;
                }
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
