<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px 0; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; background: #222; color: white; border: 1px solid #444; border-radius: 10px; cursor: pointer; }
        .analyze { background: #0070f3 !important; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Resale IQ</h1>
    <div class="card">
        <p id="statusMsg">Connecting...</p>
        
        <div id="controls" style="display:none;">
            <label>1. Take Photo:</label>
            <input type="file" id="cameraInput" accept="image/*" capture="environment" class="btn">
            
            <label>2. Choose File:</label>
            <input type="file" id="fileInput" accept="image/*" class="btn">
            
            <button id="analyzeBtn" class="btn analyze">Analyze Item</button>
            <button id="logoutBtn" class="btn" style="background:#444;">Sign Out</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const app = initializeApp({
            apiKey: "AIzaSyCHw58VHbvQxji437vYTxgakBHdRYiFVa0",
            authDomain: "resale-iq.firebaseapp.com",
            projectId: "resale-iq",
            storageBucket: "resale-iq.firebasestorage.app",
            messagingSenderId: "496480241751",
            appId: "1:496480241751:web:148d1da5cd3e322edcbb12"
        });

        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('statusMsg').innerText = "Logged in as " + user.displayName;
                document.getElementById('controls').style.display = 'block';
            } else {
                document.getElementById('statusMsg').innerHTML = '<button class="btn" id="loginBtn">Sign In with Google</button>';
                document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
            }
        });

        document.getElementById('analyzeBtn').onclick = () => {
            alert("Analyze button is working! Now we just need to connect the AI.");
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
