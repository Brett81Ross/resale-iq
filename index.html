<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Resale IQ</title>
    <style>
        :root { --accent: #0070f3; --bg: #050505; --card: rgba(255, 255, 255, 0.08); }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; line-height: 1.6; font-size: 18px; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; padding-bottom: 300px; }
        .header { text-align: center; margin: 30px 0; }
        .logo { max-width: 140px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        #result { margin-top: 20px; white-space: pre-wrap; }
        .listing-data-box { border: 2px dashed var(--accent); padding: 15px; border-radius: 12px; margin-top: 20px; background: rgba(0, 112, 243, 0.1); }
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: #000; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .btn { width: 100%; max-width: 400px; padding: 18px; border-radius: 14px; border: none; font-weight: 700; font-size: 17px; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-secondary { background: #444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><img src="logo1.png" class="logo"><h1>Resale IQ</h1></div>
        <div class="card">
            <img id="imagePreview" style="width:100%; display:none; border-radius:12px;">
            <div id="result">Select an option below to start.</div>
        </div>
    </div>

    <div class="action-bar">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
        <input type="file" id="galleryInput" accept="image/*" style="display:none;">
        
        <button class="btn btn-main" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <button class="btn btn-secondary" onclick="document.getElementById('galleryInput').click()">📂 Choose from Gallery</button>
        
        <button id="analyzeBtn" class="btn btn-main" style="display:none; background:#28a745;" onclick="analyzeImage()">🔍 Get Value</button>
        <button id="copyBtn" class="btn btn-secondary" style="display:none;" onclick="copyListing()">📋 Copy Listing</button>
    </div>

    <script>
        let resizedBase64 = "";

        // Core Image Processor
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 600; canvas.height = (600 / img.width) * img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resizedBase64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
                    document.getElementById('imagePreview').src = canvas.toDataURL();
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('analyzeBtn').style.display = 'block';
                    document.getElementById('result').innerText = "Photo loaded. Tap 'Get Value' to analyze.";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('cameraInput').onchange = e => e.target.files[0] && handleFile(e.target.files[0]);
        document.getElementById('galleryInput').onchange = e => e.target.files[0] && handleFile(e.target.files[0]);

        async function analyzeImage() {
            const btn = document.getElementById('analyzeBtn');
            const res = document.getElementById('result');
            btn.disabled = true; btn.innerText = "Analyzing...";
            try {
                const response = await fetch('/api/analyze', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ image: resizedBase64 })});
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                let text = data.candidates[0].content.parts[0].text;
                res.innerHTML = text.replace("### 📋 Listing Data", '</div><div class="listing-data-box"><h3>📋 Listing Data</h3>') + '</div>';
                document.getElementById('copyBtn').style.display = 'block';
                res.scrollIntoView({ behavior: 'smooth' });
            } catch (err) { res.innerText = "Error: " + err.message; } finally { btn.innerText = "🔍 Get Value"; btn.disabled = false; }
        }

        function copyListing() {
            const el = document.querySelector('.listing-data-box');
            if (el) navigator.clipboard.writeText(el.innerText).then(() => alert("Copied!"));
        }
    </script>
</body>
</html>
