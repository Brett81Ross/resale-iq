<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResaleIQ</title>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100%; background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .app-container { max-width: 480px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        .brand-header { text-align: center; padding: 20px 0; }
        .main-logo { width: 150px; height: 150px; object-fit: contain; }
        .content-area { padding: 16px; }
        .app-input { width: 100%; background-color: #161616; border: 1px solid #333; border-radius: 12px; padding: 16px; color: #ffffff; box-sizing: border-box; margin-bottom: 16px; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; margin-bottom: 12px; color: #ffffff; }
        .btn-blue { background-color: #007aff; }
        .btn-green { background-color: #34c759; }
        .hidden-uploader { position: absolute; opacity: 0; width: 0; height: 0; }
        #status-display { background-color: #1c1c1e; border-radius: 12px; padding: 20px; margin-top: 20px; border-left: 4px solid #007aff; display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="brand-header"><img src="logo1.png" alt="ResaleIQ" class="main-logo"></div>
        <div class="content-area">
            <input type="file" id="file-input" class="hidden-uploader" accept="image/*">
            <button class="btn btn-blue" id="gallery-btn">Select Photos</button>
            <button class="btn btn-green" id="camera-btn">Take Photo</button>
            <div id="status-display"></div>
        </div>
    </div>

    <script>
        const API_KEY ='AIzaSyBUYZLzUhjrBCim3wP0bI9t4oxCH5nmORY';

        document.getElementById('gallery-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('camera-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => upload(e.target.files[0]));

        async function upload(file) {
            const status = document.getElementById('status-display');
            status.style.display = 'block';
            status.textContent = "Processing...";

            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Describe this item, estimate market value, and suggest a resale price." },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                                ]
                            }]
                        })
                    });
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    status.textContent = data.candidates[0].content.parts[0].text;
                } catch (err) {
                    status.textContent = "Error: " + err.message;
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
